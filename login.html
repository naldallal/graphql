<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — GraphQL Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="orb" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <main class="login-wrapper">
    <div class="login-card">
      <div class="card-header">
        <div class="logo-mark">⬡</div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to explore your journey</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Username or Email</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="noor@domain.com"
            required
            autocomplete="username"
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button type="button" id="togglePwd" aria-label="Toggle password visibility" aria-pressed="false">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="message" class="message" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
